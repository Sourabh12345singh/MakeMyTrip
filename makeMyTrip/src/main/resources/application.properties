spring.application.name=makeMyTrip

 server.port=8080

 # MongoDB Atlas (Injected via Environment Variables with local fallbacks for Junit testing)
 spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/makeMyTrip}
 spring.mongodb.database=${SPRING_MONGODB_DATABASE:makeMyTrip}

 # Suppress auto-generated security password
 spring.security.user.password=password

 # File upload configuration
 upload.dir=./uploads
 spring.servlet.multipart.max-file-size=10MB
 spring.servlet.multipart.max-request-size=10MB

 # Static resource configuration for uploads
 spring.web.resources.static-locations=classpath:/META-INF/resources/,file:./uploads/
 spring.web.resources.chain.strategy.content.enabled=true
 spring.web.resources.chain.strategy.fixed.enabled=false

 # Logging
 logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
 logging.level.org.mongodb.driver=INFO
 logging.level.com.MakeMyTrip.makeMyTrip.services.FileStorageService=DEBUG